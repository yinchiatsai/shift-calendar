<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PJ排班日曆</title>
  <style>
    :root {
      --brand: #3e6066;
      --brand-2: #5f7d84;
      --early: #d8efe0;
      --late: #fde4d7;
      --campaign: #fff3bf;
      --campaign-border: #f2c94c;
      --text: #233236;
      --muted: #6f8186;
      --border: #d9e4e7;
      --bg: #f7fafb;
      --white: #ffffff;
      --shadow: 0 10px 30px rgba(62, 96, 102, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #f8fbfc 0%, #eef4f5 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .card {
      background: var(--white);
      border: 1px solid rgba(62, 96, 102, 0.08);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 24px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
      color: white;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .header p {
      margin: 0;
      opacity: 0.92;
      font-size: 15px;
    }

    .toolbar {
      padding: 18px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: #fbfdfd;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    label {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select,
    button,
    textarea {
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      background: white;
      color: var(--text);
      font-family: inherit;
    }

    select,
    button {
      padding: 10px 14px;
    }

    button {
      cursor: pointer;
      transition: 0.2s ease;
    }

    button.primary {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
    }

    button:hover { transform: translateY(-1px); }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      font-size: 14px;
      color: var(--muted);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid var(--border);
      background: white;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.early { background: #8bc79d; }
    .dot.late { background: #f0a97c; }
    .dot.campaign { background: #f2c94c; }
    .dot.empty { background: #d6e1e4; }

    .calendar-area {
      padding: 20px;
      background: var(--bg);
    }

    .month-title {
      margin: 0 0 14px;
      font-size: 24px;
      color: var(--brand);
      font-weight: 700;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
      width: 100%;
    }

    .weekday,
    .day {
      border-radius: var(--radius);
    }

    .weekday {
      padding: 10px 6px;
      text-align: center;
      font-weight: 700;
      background: #e8f0f1;
      color: var(--brand);
      font-size: 14px;
    }

    .day {
      min-height: 124px;
      background: white;
      border: 1px solid var(--border);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      transition: 0.18s ease;
    }

    .day.blank {
      background: transparent;
      border: 1px dashed rgba(62, 96, 102, 0.08);
      min-height: 124px;
    }

    .day.clickable:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(62, 96, 102, 0.08);
      border-color: #bdd0d5;
    }

    .day.has-campaign {
      border: 1.5px solid var(--campaign-border);
      box-shadow: inset 0 0 0 1px rgba(242, 201, 76, 0.15);
    }

    .day-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 6px;
    }

    .date-num {
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
      line-height: 1;
    }

    .top-badges {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .today,
    .campaign-badge {
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 999px;
      font-weight: 700;
      white-space: nowrap;
    }

    .today {
      color: white;
      background: var(--brand);
    }

    .campaign-badge {
      color: #7a5b00;
      background: var(--campaign);
      border: 1px solid rgba(242, 201, 76, 0.7);
    }

    .shift-tag {
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      line-height: 1.2;
    }

    .shift-early {
      background: var(--early);
      color: #2c6841;
    }

    .shift-late {
      background: var(--late);
      color: #9a4f22;
    }

    .shift-empty {
      background: #eef3f4;
      color: #819398;
    }

    .day-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      min-width: 0;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.2;
    }

    .note-preview {
      font-size: 11px;
      color: #55656a;
      line-height: 1.35;
      word-break: break-word;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(21, 34, 37, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 10;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: 100%;
      max-width: 440px;
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .modal-card h2 {
      margin: 0 0 8px;
      font-size: 24px;
      color: var(--brand);
    }

    .modal-card p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .modal-section-title {
      margin: 18px 0 10px;
      font-size: 14px;
      font-weight: 700;
      color: var(--brand);
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .choice-btn {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      text-align: left;
      font-weight: 700;
    }

    .choice-btn[data-value="early"] { background: #f3fbf5; }
    .choice-btn[data-value="late"] { background: #fff5ef; }
    .choice-btn[data-value=""] { background: #f7fafb; }

    .campaign-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #fffdf3;
      border: 1px solid #f4e3a1;
      margin-bottom: 16px;
    }

    .campaign-toggle label {
      font-size: 15px;
      color: var(--text);
      font-weight: 700;
      gap: 10px;
    }

    .campaign-toggle input {
      width: 18px;
      height: 18px;
      accent-color: #c79b11;
    }

    #noteInput {
      width: 100%;
      min-height: 84px;
      padding: 12px;
      resize: vertical;
      line-height: 1.45;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    body.screenshot-mode .wrap {
      max-width: 1320px;
      padding: 10px;
    }

    body.screenshot-mode .card {
      border-radius: 18px;
    }

    body.screenshot-mode .header {
      padding: 14px 18px;
    }

    body.screenshot-mode .header h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    body.screenshot-mode .header p {
      font-size: 13px;
    }

    body.screenshot-mode .toolbar {
      padding: 12px 18px;
      gap: 8px;
    }

    body.screenshot-mode .legend {
      gap: 6px;
      font-size: 12px;
    }

    body.screenshot-mode .pill {
      padding: 4px 8px;
      font-size: 11px;
    }

    body.screenshot-mode .calendar-area {
      padding: 14px;
    }

    body.screenshot-mode .month-title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    body.screenshot-mode .calendar {
      gap: 4px;
    }

    body.screenshot-mode .weekday {
      font-size: 12px;
      padding: 8px 4px;
      border-radius: 12px;
    }

    body.screenshot-mode .day,
    body.screenshot-mode .day.blank {
      min-height: 88px;
      padding: 8px;
      gap: 5px;
      border-radius: 12px;
    }

    body.screenshot-mode .date-num {
      font-size: 14px;
    }

    body.screenshot-mode .hint {
      font-size: 11px;
    }

    body.screenshot-mode .shift-tag {
      font-size: 11px;
      padding: 4px 8px;
    }

    body.screenshot-mode .note-preview {
      font-size: 10px;
    }

    @media (max-width: 900px) {
      .wrap {
        padding: 12px 10px 24px;
      }

      .header {
        padding: 18px;
      }

      .header h1 {
        font-size: 23px;
      }

      .header p {
        font-size: 14px;
      }

      .toolbar {
        padding: 14px;
        align-items: stretch;
      }

      .controls {
        width: 100%;
      }

      .controls label {
        flex: 1 1 calc(50% - 8px);
        min-width: 140px;
      }

      .controls select,
      .controls button {
        width: 100%;
      }

      .legend {
        width: 100%;
      }

      .calendar-area {
        padding: 12px;
      }

      .month-title {
        font-size: 20px;
      }

      .calendar {
        gap: 4px;
      }

      .weekday {
        font-size: 12px;
        padding: 8px 4px;
      }

      .day,
      .day.blank {
        min-height: 86px;
        padding: 7px;
        border-radius: 14px;
      }

      .date-num {
        font-size: 14px;
      }

      .shift-tag {
        font-size: 11px;
        padding: 4px 7px;
      }

      .campaign-badge,
      .today {
        font-size: 10px;
        padding: 2px 5px;
      }

      .hint {
        font-size: 10px;
      }

      .note-preview {
        font-size: 10px;
      }
    }

    @media (max-width: 560px) {
      .wrap {
        padding: 8px 6px 18px;
      }

      .header {
        padding: 14px;
      }

      .header h1 {
        font-size: 20px;
      }

      .header p {
        font-size: 12px;
      }

      .toolbar {
        padding: 10px;
        gap: 8px;
      }

      .controls {
        gap: 8px;
      }

      .controls label,
      .controls button {
        flex: 1 1 100%;
      }

      .legend {
        gap: 6px;
      }

      .pill {
        font-size: 11px;
        padding: 5px 8px;
      }

      .calendar-area {
        padding: 8px;
      }

      .month-title {
        font-size: 18px;
        margin-bottom: 10px;
      }

      .calendar {
        gap: 3px;
      }

      .weekday {
        font-size: 10px;
        padding: 7px 2px;
        border-radius: 10px;
      }

      .day,
      .day.blank {
        min-height: 74px;
        padding: 5px;
        gap: 4px;
        border-radius: 10px;
      }

      .date-num {
        font-size: 12px;
      }

      .top-badges {
        gap: 3px;
      }

      .today,
      .campaign-badge {
        font-size: 9px;
        padding: 2px 4px;
      }

      .shift-tag {
        font-size: 10px;
        padding: 3px 6px;
      }

      .hint {
        font-size: 9px;
      }

      .note-preview {
        font-size: 9px;
        -webkit-line-clamp: 2;
      }

      .modal-card {
        padding: 18px;
        border-radius: 18px;
      }

      .modal-card h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <h1>遠端同事排班日曆</h1>
        <p>可切換年份、月份，點選日期後標示早班、晚班，並註記是否為電商大檔與備註，方便截圖確認。</p>
      </div>

      <div class="toolbar">
        <div class="controls">
          <label>
            年份
            <select id="yearSelect"></select>
          </label>
          <label>
            月份
            <select id="monthSelect"></select>
          </label>
          <button id="todayBtn">回到本月</button>
          <button id="screenshotModeBtn">截圖模式</button>
          <button id="clearMonthBtn">清空本月標示</button>
        </div>

        <div class="legend">
          <span class="pill"><span class="dot early"></span>早班</span>
          <span class="pill"><span class="dot late"></span>晚班</span>
          <span class="pill"><span class="dot campaign"></span>電商大檔</span>
          <span class="pill"><span class="dot empty"></span>未設定</span>
        </div>
      </div>

      <div class="calendar-area">
        <h2 class="month-title" id="monthTitle"></h2>
        <div class="calendar" id="calendar"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="shiftModal">
    <div class="modal-card">
      <h2 id="modalDateTitle">設定班別</h2>
      <p>請設定這一天的排班、是否為電商大檔與備註。</p>

      <div class="modal-section-title">班別</div>
      <div class="choices">
        <button type="button" class="choice-btn" data-value="early">☀️ 早班</button>
        <button type="button" class="choice-btn" data-value="late">🌙 晚班</button>
        <button type="button" class="choice-btn" data-value="">清除班別</button>
      </div>

      <div class="modal-section-title">特殊註記</div>
      <div class="campaign-toggle">
        <label for="campaignCheckbox">⭐ 標示為電商大檔</label>
        <input type="checkbox" id="campaignCheckbox" />
      </div>

      <div class="modal-section-title">備註</div>
      <textarea id="noteInput" placeholder="例如：請假、外出、重要事項"></textarea>

      <div class="modal-actions">
        <button type="button" id="saveModalBtn" class="primary">儲存</button>
        <button type="button" id="closeModalBtn">取消</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getDatabase,
      ref,
      set,
      remove,
      onValue
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const yearSelect = document.getElementById('yearSelect');
    const monthSelect = document.getElementById('monthSelect');
    const monthTitle = document.getElementById('monthTitle');
    const calendar = document.getElementById('calendar');
    const todayBtn = document.getElementById('todayBtn');
    const clearMonthBtn = document.getElementById('clearMonthBtn');
    const screenshotModeBtn = document.getElementById('screenshotModeBtn');
    const shiftModal = document.getElementById('shiftModal');
    const modalDateTitle = document.getElementById('modalDateTitle');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const saveModalBtn = document.getElementById('saveModalBtn');
    const choiceButtons = document.querySelectorAll('.choice-btn');
    const campaignCheckbox = document.getElementById('campaignCheckbox');
    const noteInput = document.getElementById('noteInput');

    const weekNames = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
    const shortWeekNames = ['日', '一', '二', '三', '四', '五', '六'];

    const today = new Date();
    let currentYear = today.getFullYear();
    let currentMonth = today.getMonth();
    let activeDateKey = '';
    let selectedShiftValue = '';
    let shiftData = {};

    const firebaseConfig = {
      apiKey: "AIzaSyDF0khZIJHtYCJhu0pTf3FEN3kL8ck7w",
      authDomain: "shift-arrangement.firebaseapp.com",
      databaseURL: "https://shift-arrangement-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shift-arrangement",
      storageBucket: "shift-arrangement.firebasestorage.app",
      messagingSenderId: "218542467269",
      appId: "1:218542467269:web:aa440ce0abe02c27b9e8ac"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const shiftsRef = ref(db, 'shiftCalendar');

    onValue(shiftsRef, (snapshot) => {
      shiftData = snapshot.val() || {};
      renderCalendar();
    });

    function getDateKey(year, month, day) {
      return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }

    function getDayData(dateKey) {
      return shiftData[dateKey] || { shift: '', campaign: false, note: '' };
    }

    function populateSelectors() {
      for (let y = today.getFullYear() - 3; y <= today.getFullYear() + 3; y++) {
        const option = document.createElement('option');
        option.value = y;
        option.textContent = `${y} 年`;
        if (y === currentYear) option.selected = true;
        yearSelect.appendChild(option);
      }

      for (let m = 0; m < 12; m++) {
        const option = document.createElement('option');
        option.value = m;
        option.textContent = `${m + 1} 月`;
        if (m === currentMonth) option.selected = true;
        monthSelect.appendChild(option);
      }
    }

    function getShiftLabel(shift) {
      if (shift === 'early') return { text: '早班', cls: 'shift-early' };
      if (shift === 'late') return { text: '晚班', cls: 'shift-late' };
      return { text: '未設定', cls: 'shift-empty' };
    }

    function highlightSelectedShift() {
      choiceButtons.forEach((btn) => {
        const isSelected = btn.dataset.value === selectedShiftValue;
        btn.style.outline = isSelected ? '2px solid #3e6066' : 'none';
        btn.style.boxShadow = isSelected ? '0 0 0 4px rgba(62, 96, 102, 0.08)' : 'none';
      });
    }

    function renderCalendar() {
      calendar.innerHTML = '';
      monthTitle.textContent = `${currentYear} 年 ${currentMonth + 1} 月`;

      shortWeekNames.forEach((name) => {
        const weekday = document.createElement('div');
        weekday.className = 'weekday';
        weekday.textContent = name;
        calendar.appendChild(weekday);
      });

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

      for (let i = 0; i < firstDay; i += 1) {
        const blank = document.createElement('div');
        blank.className = 'day blank';
        calendar.appendChild(blank);
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const date = new Date(currentYear, currentMonth, day);
        const dateKey = getDateKey(currentYear, currentMonth, day);
        const dayData = getDayData(dateKey);
        const shiftInfo = getShiftLabel(dayData.shift);

        const cell = document.createElement('div');
        cell.className = `day clickable ${dayData.campaign ? 'has-campaign' : ''}`;
        cell.dataset.dateKey = dateKey;

        const isToday =
          day === today.getDate() &&
          currentMonth === today.getMonth() &&
          currentYear === today.getFullYear();

        const safeNote = dayData.note
          ? String(dayData.note).replace(/</g, '&lt;').replace(/>/g, '&gt;')
          : '';

        cell.innerHTML = `
          <div class="day-top">
            <div class="date-num">${day}</div>
            <div class="top-badges">
              ${dayData.campaign ? '<span class="campaign-badge">大檔</span>' : ''}
              ${isToday ? '<span class="today">今天</span>' : ''}
            </div>
          </div>
          <div class="hint">${weekNames[date.getDay()]}</div>
          <div class="day-bottom">
            <div class="shift-tag ${shiftInfo.cls}">${shiftInfo.text}</div>
            ${safeNote ? `<div class="note-preview">📝 ${safeNote}</div>` : ''}
          </div>
        `;

        cell.addEventListener('click', () => {
          openModal(dateKey, `${currentYear} 年 ${currentMonth + 1} 月 ${day} 日`);
        });

        calendar.appendChild(cell);
      }
    }

    function openModal(dateKey, label) {
      activeDateKey = dateKey;
      const dayData = getDayData(dateKey);
      selectedShiftValue = dayData.shift || '';
      campaignCheckbox.checked = !!dayData.campaign;
      noteInput.value = dayData.note || '';
      highlightSelectedShift();
      modalDateTitle.textContent = label;
      shiftModal.classList.add('show');
    }

    function closeModal() {
      shiftModal.classList.remove('show');
      activeDateKey = '';
      selectedShiftValue = '';
      noteInput.value = '';
      highlightSelectedShift();
    }

    choiceButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        selectedShiftValue = btn.dataset.value;
        highlightSelectedShift();
      });
    });

    saveModalBtn.addEventListener('click', async () => {
      if (!activeDateKey) return;

      const trimmedNote = noteInput.value.trim();
      const newData = {
        shift: selectedShiftValue,
        campaign: campaignCheckbox.checked,
        note: trimmedNote
      };

      if (!newData.shift && !newData.campaign && !newData.note) {
        await remove(ref(db, `shiftCalendar/${activeDateKey}`));
      } else {
        await set(ref(db, `shiftCalendar/${activeDateKey}`), newData);
      }

      closeModal();
    });

    closeModalBtn.addEventListener('click', closeModal);

    shiftModal.addEventListener('click', (e) => {
      if (e.target === shiftModal) closeModal();
    });

    yearSelect.addEventListener('change', () => {
      currentYear = Number(yearSelect.value);
      renderCalendar();
    });

    monthSelect.addEventListener('change', () => {
      currentMonth = Number(monthSelect.value);
      renderCalendar();
    });

    screenshotModeBtn.addEventListener('click', () => {
      document.body.classList.toggle('screenshot-mode');
      const enabled = document.body.classList.contains('screenshot-mode');
      screenshotModeBtn.textContent = enabled ? '一般模式' : '截圖模式';
    });

    todayBtn.addEventListener('click', () => {
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      yearSelect.value = currentYear;
      monthSelect.value = currentMonth;
      renderCalendar();
    });

    clearMonthBtn.addEventListener('click', async () => {
      const confirmed = confirm(`確定要清空 ${currentYear} 年 ${currentMonth + 1} 月的所有標示嗎？`);
      if (!confirmed) return;

      const prefix = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-`;
      const entries = Object.keys(shiftData).filter((key) => key.startsWith(prefix));
      await Promise.all(entries.map((key) => remove(ref(db, `shiftCalendar/${key}`))));
    });

    populateSelectors();
    renderCalendar();
  </script>
</body>
</html>
